databases:
  - name: visionx-db
    databaseName: visionx
    user: visionx
    plan: free

services:
  - type: keyvalue
    name: visionx-rate-limits
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

  - type: web
    name: visionx-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 'app:create_app()'
    preDeployCommand: alembic upgrade head
    healthCheckPath: /health/ready
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: visionx-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: visionx-rate-limits
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CRON_SECRET
        generateValue: true
      - key: X_CLIENT_ID
        sync: false
      - key: X_CLIENT_SECRET
        sync: false
      - key: X_BEARER_TOKEN
        sync: false
      - key: X_REDIRECT_URI
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FORCE_HTTPS
        value: "true"
